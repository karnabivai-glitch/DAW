<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Cloud DAW - Mixing Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121824; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .daw-container { background: #1e293b; border-radius: 12px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .track-row { background: #334155; margin-bottom: 10px; padding: 15px; border-radius: 8px; border-left: 5px solid #3b82f6; }
        .fader { height: 120px; writer-mode: bt-lr; -webkit-appearance: slider-vertical; }
        .ai-panel { background: #0f172a; border-radius: 8px; padding: 15px; border: 1px solid #1e3a8a; }
        .negative-val { color: #f87171; font-weight: bold; } /* Format standard untuk discrepancy/minus */
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div class="row mb-3">
        <div class="col-md-8">
            <h2>🎛️ Cloud DAW <small class="text-muted fs-6">v1.0 (Mixing Engine)</small></h2>
        </div>
        <div class="col-md-4 text-end">
            <input type="password" id="apiKey" class="form-control form-control-sm bg-dark text-light border-secondary" placeholder="Masukkan API Key Pemandu...">
        </div>
    </div>

    <div class="daw-container">
        <div class="d-flex gap-2 mb-4 p-2 bg-dark rounded">
            <button class="btn btn-success btn-sm" onclick="playAll()">▶ Play</button>
            <button class="btn btn-danger btn-sm" onclick="stopAll()">⏹ Stop</button>
            <input type="file" id="audioImporter" class="form-control form-control-sm w-auto d-inline-block bg-secondary text-light" accept="audio/*" multiple onchange="importAudio(event)">
            <button class="btn btn-primary btn-sm ms-auto" onclick="askAiAssistant()">🤖 Minta Panduan AI</button>
        </div>

        <div class="row">
            <div class="col-md-8" id="tracksContainer">
                <p class="text-muted text-center my-5">Belum ada track. Silakan import file audio (WAV/MP3).</p>
            </div>

            <div class="col-md-4">
                <div class="ai-panel h-100">
                    <h5>🧠 Otak Pemandu (AI Assistant)</h5>
                    <hr class="border-secondary">
                    <div id="aiOutput" style="font-size: 14px; max-height: 400px; overflow-y: auto;">
                        Silakan masukkan API Key dan klik "Minta Panduan AI" untuk menganalisis sesi mixing Anda.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// --- GLOBAL CONFIG & AUDIO CONTEXT ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let tracks = []; // Menyimpan data track yang aktif
let db;

// --- INITIALIZE INDEXEDDB ---
const request = indexedDB.open("CloudDAW_DB", 1);
request.onupgradeneeded = (e) => {
    db = e.target.result;
    if (!db.objectStoreNames.contains("audio_tracks")) {
        db.createObjectStore("audio_tracks", { keyPath: "id", autoIncrement: true });
    }
};
request.onsuccess = (e) => { db = e.target.result; loadTracksFromDB(); };

// --- STORAGE ENGINE (IndexedDB) ---
function saveTrackToDB(name, arrayBuffer) {
    const transaction = db.transaction(["audio_tracks"], "readwrite");
    const store = transaction.objectStore("audio_tracks");
    const trackData = { name: name, audioData: arrayBuffer, volume: 0.8, panning: 0 };
    
    store.add(trackData).onsuccess = () => {
        loadTracksFromDB(); // Reload UI
    };
}

function loadTracksFromDB() {
    if (!db) return;
    const store = db.transaction(["audio_tracks"], "readonly").objectStore("audio_tracks");
    tracks = [];
    
    store.openCursor().onsuccess = (event) => {
        const cursor = event.target.result;
        if (cursor) {
            tracks.push(cursor.value);
            cursor.continue();
        } else {
            renderTracks();
        }
    };
}

// --- AUDIO ENGINE (Web Audio API) ---
async function importAudio(event) {
    const files = event.target.files;
    for (let file of files) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            saveTrackToDB(file.name, e.target.result);
        };
        reader.readAsArrayBuffer(file);
    }
}

function renderTracks() {
    const container = document.getElementById("tracksContainer");
    if (tracks.length === 0) {
        container.innerHTML = `<p class="text-muted text-center my-5">Belum ada track. Silakan import file audio.</p>`;
        return;
    }

    container.innerHTML = tracks.map((track, index) => `
        <div class="track-row">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <h6 class="text-truncate mb-1">${track.name}</h6>
                    <span class="badge bg-secondary">Track ${index + 1}</span>
                </div>
                <div class="col-md-3 text-center">
                    <label class="form-label d-block mb-0 font-monospace" style="font-size:12px;">Volume</label>
                    <input type="range" class="form-range" min="0" max="1.5" step="0.05" value="${track.volume}" 
                        oninput="updateVolume(${index}, this.value)">
                </div>
                <div class="col-md-3 text-center">
                    <label class="form-label d-block mb-0 font-monospace" style="font-size:12px;">Pan (L/R)</label>
                    <input type="range" class="form-range" min="-1" max="1" step="0.1" value="${track.panning}" 
                        oninput="updatePan(${index}, this.value)">
                </div>
                <div class="col-md-2 text-end">
                    <button class="btn btn-outline-danger btn-sm" onclick="deleteTrack(${track.id})">🗑️</button>
                </div>
            </div>
        </div>
    `).join('');
}

// Control Runtime Node Audio
let activeSources = [];

async function playAll() {
    stopAll(); // Reset jika sedang berjalan
    if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }

    for (let track of tracks) {
        // Decode ArrayBuffer dari IndexedDB ke AudioBuffer secara realtime saat play
        const bufferCopy = track.audioData.slice(0); // kloning buffer
        try {
            const audioBuffer = await audioCtx.decodeAudioData(bufferCopy);
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;

            // Buat node Gain (Volume) dan Panner (L/R)
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = track.volume;

            const pannerNode = audioCtx.createStereoPanner();
            pannerNode.pan.value = track.panning;

            // Routing: Source -> Gain -> Panner -> Destination (Master Output)
            source.connect(gainNode);
            gainNode.connect(pannerNode);
            pannerNode.connect(audioCtx.destination);

            source.start(0);
            activeSources.push({ source, gainNode, pannerNode, id: track.id });
        } catch (e) {
            console.error("Gagal mendecode audio: ", e);
        }
    }
}

function stopAll() {
    activeSources.forEach(s => s.source.stop());
    activeSources = [];
}

function updateVolume(index, val) {
    tracks[index].volume = parseFloat(val);
    const active = activeSources.find(s => s.id === tracks[index].id);
    if (active) active.gainNode.gain.setValueAtTime(val, audioCtx.currentTime);
}

function updatePan(index, val) {
    tracks[index].panning = parseFloat(val);
    const active = activeSources.find(s => s.id === tracks[index].id);
    if (active) active.pannerNode.pan.setValueAtTime(val, audioCtx.currentTime);
}

function deleteTrack(id) {
    stopAll();
    const transaction = db.transaction(["audio_tracks"], "readwrite");
    transaction.objectStore("audio_tracks").delete(id).onsuccess = () => {
        loadTracksFromDB();
    };
}

// --- AI ENGINE (Brain Assistant Integrator) ---
async function askAiAssistant() {
    const apiKey = document.getElementById("apiKey").value;
    const aiOutput = document.getElementById("aiOutput");
    
    if (!apiKey) {
        aiOutput.innerHTML = `<span class="text-danger">⚠️ Harap masukkan API Key terlebih dahulu!</span>`;
        return;
    }

    aiOutput.innerHTML = `<div class="spinner-border spinner-border-sm text-primary" role="status"></div> Memikirkan strategi mixing...`;

    // Ambil metadata track saat ini untuk dikirim ke AI
    const sessionMetadata = tracks.map((t, i) => ({
        trackNumber: i + 1,
        fileName: t.name,
        currentVolume: t.volume,
        currentPan: t.panning
    }));

    // Prompt khusus untuk memandu mixing engineer
    const prompt = `Anda adalah Sound Engineer Profesional Senior. Berikan saran taktik mixing (Volume balance, Panning, EQ, Kompresi, dan penempatan ruang/reverb) berdasarkan struktur track session berikut: ${JSON.stringify(sessionMetadata)}. Berikan rekomendasi yang ringkas, taktis, dan langsung pada angka settingan fader/pan jika diperlukan. Gunakan bahasa Indonesia.`;

    try {
        // Integrasi API (Menggunakan endpoint kompetitif modern / DeepSeek/Gemini compatible format)
        const response = await fetch("https://api.deepseek.com/v1/chat/completions", { // Sesuaikan endpoint target jika memakai provider lain
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: "deepseek-chat",
                messages: [{ role: "user", content: prompt }],
                temperature: 0.5
            })
        });

        const data = await response.json();
        if (data.choices && data.choices[0]) {
            aiOutput.innerHTML = data.choices[0].message.content.replace(/\n/g, "<br>");
        } else {
            aiOutput.innerHTML = "Gagal mendapatkan respon dari otak pemandu.";
        }
    } catch (err) {
        aiOutput.innerHTML = `<span class="text-danger">Error: ${err.message}</span>`;
    }
}
</script>

</body>
</html>
